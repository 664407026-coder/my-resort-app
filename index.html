<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black">
    <meta name="apple-mobile-web-app-title" content="Resort Cloud">
    <title>ระบบจัดการไอธารารีสอร์ท</title>
    <style>
        :root {
            --bg-color: #f4f7f6;
            --primary: #2c3e50;
            --success: #4CAF50;
            --danger: #F44336;
            --white: #ffffff;
            --gray: #eef2f5;
        }
        * { box-sizing: border-box; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        body { margin: 0; background-color: var(--bg-color); padding: 15px; -webkit-tap-highlight-color: transparent; }
        h1, h2, h3 { color: var(--primary); text-align: center; margin-top: 0;}
        
        .auth-container { max-width: 400px; margin: 100px auto; background: var(--white); padding: 30px; border-radius: 12px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); text-align: center; }
        .auth-container input { width: 100%; margin-bottom: 15px; padding: 12px; border: 1px solid #ccc; border-radius: 8px; }
        .auth-container button { width: 100%; padding: 12px; background: var(--primary); color: white; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; }
        #appContainer { display: none; max-width: 900px; margin: auto; }
        
        /* Grid ห้องพัก */
        .room-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(130px, 1fr)); gap: 15px; margin-bottom: 30px; }
        .room {
            background: var(--success); color: var(--white);
            border-radius: 12px; padding: 20px 10px; text-align: center;
            cursor: pointer; box-shadow: 0 4px 6px rgba(0,0,0,0.1); transition: transform 0.1s;
        }
        .room:active { transform: scale(0.95); }
        .room.occupied { background: var(--danger); }
        .room-name { font-size: 22px; font-weight: bold; display: block; }
        .room-type { font-size: 14px; opacity: 0.9; }

        /* Dashboard */
        .dashboard { background: var(--white); padding: 20px; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); margin-bottom: 20px; }
        .stats { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; text-align: center; margin-bottom: 20px; }
        .stat-box { padding: 15px; border-radius: 8px; background: var(--gray); font-size: 16px; font-weight: bold; }
        .stat-box span { display: block; font-size: 20px; margin-top: 5px; }
        
        /* ประวัติรายการ */
        .history-box { max-height: 200px; overflow-y: auto; background: var(--gray); border-radius: 8px; padding: 10px; margin-top: 15px; font-size: 14px;}
        .history-item { display: flex; justify-content: space-between; padding: 8px 0; border-bottom: 1px solid #ddd; }
        .history-item:last-child { border-bottom: none; }
        .text-green { color: var(--success); font-weight: bold;}
        .text-red { color: var(--danger); font-weight: bold;}
        .customer-note { display: block; font-size: 12px; color: #7f8c8d; margin-top: 2px; }

        /* ฟอร์ม */
        .expense-form { display: flex; gap: 10px; flex-wrap: wrap; }
        select, input, button { padding: 12px; font-size: 16px; border: 1px solid #ccc; border-radius: 8px; outline: none; }
        select, input { flex: 1; min-width: 140px; }
        .btn-main { background: var(--primary); color: var(--white); border: none; cursor: pointer; font-weight: bold; width: 100%; margin-top: 10px;}
        
        /* Modal */
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.6); justify-content: center; align-items: center; z-index: 1000;}
        .modal-content { background: var(--white); padding: 25px; border-radius: 12px; width: 90%; max-width: 350px; text-align: center; }
        .btn-group { display: flex; gap: 10px; margin-top: 20px; }
        .btn-group button { flex: 1; padding: 12px; border-radius: 8px; font-weight: bold; }
        .btn-cancel { background: #95a5a6; color: white; border: none; }
        .btn-confirm { background: var(--success); color: white; border: none; }
        .btn-checkout { background: var(--primary); color: white; border: none; width: 100%; margin-top: 20px; padding: 12px; border-radius: 8px; font-weight: bold;}
        
        /* Top Bar Buttons */
        .top-bar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; }
        .logout-btn { background: #7f8c8d; color: white; border: none; padding: 8px 15px; cursor: pointer; border-radius: 5px; }
        .clear-all-btn { background: var(--danger); color: white; border: none; padding: 8px 15px; cursor: pointer; border-radius: 5px; font-weight: bold;}
        
        .account-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; border-bottom: 2px solid var(--gray); padding-bottom: 10px; }
        
        /* Modal Input Label */
        .modal-label { display: block; text-align: left; margin-bottom: 5px; font-size: 14px; font-weight: bold; color: var(--primary); }
    </style>
</head>
<body>

    <div id="authContainer" class="auth-container">
        <h2>ระบบจัดการรีสอร์ท</h2>
        <p>กรุณาลงชื่อเข้าใช้งาน</p>
        <input type="email" id="loginEmail" placeholder="อีเมล">
        <input type="password" id="loginPassword" placeholder="รหัสผ่าน">
        <button id="btnLogin">เข้าสู่ระบบ</button>
    </div>

    <div id="appContainer">
        <div class="top-bar">
            <h1 style="margin: 0; text-align: left; font-size: 24px;">สถานะห้องพัก</h1>
            <div>
                <button class="clear-all-btn" id="btnClearAll">เคลียร์ทุกห้อง</button>
                <button class="logout-btn" id="btnLogout">ออก</button>
            </div>
        </div>

        <div class="room-grid" id="roomContainer"></div>

        <div class="dashboard">
            <div class="account-header">
                <h2 style="margin: 0; font-size: 20px;">รายงานบัญชี</h2>
                <select id="monthSelector" style="max-width: 180px; padding: 6px; font-size: 14px; margin: 0;"></select>
            </div>
            
            <div class="stats">
                <div class="stat-box">รายได้<span id="totalIncome" class="text-green">0</span></div>
                <div class="stat-box">รายจ่าย<span id="totalExpense" class="text-red">0</span></div>
                <div class="stat-box">ผลประกอบการ(กำไร)<span id="netProfit">0</span></div>
            </div>
            
            <h3>บันทึกค่าใช้จ่ายอื่นๆ</h3>
            <div class="expense-form">
                <select id="expenseCategory">
                    <option value="" disabled selected>-- เลือกหมวดหมู่ --</option>
                    <option value="ค่าน้ำ">ค่าน้ำ</option>
                    <option value="ค่าไฟ">ค่าไฟ</option>
                    <option value="ค่าอุปกรณ์">ค่าอุปกรณ์</option>
                    <option value="ค่าซ่อมบำรุง">ค่าซ่อมบำรุง</option>
                    <option value="ค่าแรง/ค่าจ้าง">ค่าจ้าง</option>
                </select>
                <input type="number" id="expenseAmount" placeholder="จำนวนเงิน (บาท)">
            </div>
            <button class="btn-main" id="btnSaveExpense">บันทึกรายจ่าย</button>

            <h3 style="margin-top: 25px; text-align: left; font-size: 16px;" id="historyTitle">ประวัติรายการ</h3>
            <div class="history-box" id="transactionHistory"></div>
        </div>
    </div>

    <div class="modal" id="checkInModal">
        <div class="modal-content">
            <h3 id="modalRoomName">เช็คอินห้อง</h3>
            <p id="modalRoomTypeDisplay" style="color: gray; margin-top: -10px; margin-bottom: 20px;"></p>
            
            <div style="margin-bottom: 15px;">
                <label class="modal-label">ข้อมูลลูกค้า:</label>
                <input type="text" id="customerInfo" placeholder="เบอร์โทรศัพท์ / เลขบัตร ปชช." style="width: 100%;">
            </div>

            <div style="margin-bottom: 15px;">
                <label class="modal-label">ประเภทการพัก:</label>
                <select id="stayType" style="width: 100%;">
                    <option value="overnight">ค้างคืน</option>
                    <option value="short">ชั่วคราว</option>
                </select>
            </div>
            
            <div style="margin-bottom: 15px;">
                <label class="modal-label">ราคา (ระบุเอง):</label>
                <input type="number" id="customPrice" style="width: 100%; font-weight: bold; color: var(--primary);">
            </div>

            <div class="btn-group">
                <button class="btn-cancel" id="btnCancelCheckIn">ยกเลิก</button>
                <button class="btn-confirm" id="btnConfirmCheckIn">บันทึกเข้าพัก</button>
            </div>
        </div>
    </div>

    <div class="modal" id="checkOutModal">
        <div class="modal-content">
            <h3 id="checkoutRoomName">จัดการห้อง</h3>
            <p>ห้องนี้มีผู้เข้าพักอยู่ ต้องการเคลียร์ห้องให้ว่างหรือไม่?</p>
            <button class="btn-cancel" id="btnCancelCheckOut" style="width: 100%;">ปิดหน้าต่าง</button>
            <button class="btn-checkout" id="btnConfirmCheckOut">เคลียร์ห้อง (เช็คเอาท์)</button>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword, signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        import { getFirestore, doc, onSnapshot, setDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyC8shKbvqwEgBXqRzfnboALb2kPyvv5UnA",
            authDomain: "my-resort-app-60d6e.firebaseapp.com",
            projectId: "my-resort-app-60d6e",
            storageBucket: "my-resort-app-60d6e.firebasestorage.app",
            messagingSenderId: "30815932961",
            appId: "1:30815932961:web:2684a3a53d195ad4f00960",
            measurementId: "G-FZYK7V66RY"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        const pricing = {
            vip: { overnight: 500, short: 300, label: "VIP" },
            standard: { overnight: 400, short: 250, label: "เเอร์" },
            fan: { overnight: 300, short: 200, label: "พัดลม" }
        };

        let appData = {
            rooms: [
                { id: "3", name: "ห้อง 3", type: "fan", status: "available" },
                { id: "7", name: "ห้อง 7", type: "standard", status: "available" },
                { id: "8", name: "ห้อง 8", type: "standard", status: "available" },
                { id: "9", name: "ห้อง 9", type: "standard", status: "available" },
                { id: "10", name: "ห้อง 10", type: "standard", status: "available" },
                { id: "v1", name: "ห้อง V1", type: "vip", status: "available" },
                { id: "v2", name: "ห้อง V2", type: "vip", status: "available" }
            ],
            transactions: []
        };

        let currentSelectedRoomId = null;

        function generateMonthOptions() {
            const selector = document.getElementById('monthSelector');
            selector.innerHTML = '';
            const now = new Date();
            const monthNames = ["ม.ค.", "ก.พ.", "มี.ค.", "เม.ย.", "พ.ค.", "มิ.ย.", "ก.ค.", "ส.ค.", "ก.ย.", "ต.ค.", "พ.ย.", "ธ.ค."];
            
            for (let i = 0; i < 12; i++) {
                const d = new Date(now.getFullYear(), now.getMonth() - i, 1);
                const m = d.getMonth();
                const y = d.getFullYear();
                const opt = document.createElement('option');
                opt.value = `${y}-${m}`;
                opt.innerText = `${monthNames[m]} ${y + 543}`;
                selector.appendChild(opt);
            }
            selector.addEventListener('change', updateDashboard);
        }

        onAuthStateChanged(auth, (user) => {
            if (user) {
                document.getElementById('authContainer').style.display = 'none';
                document.getElementById('appContainer').style.display = 'block';
                generateMonthOptions();
                startRealtimeSync();
            } else {
                document.getElementById('authContainer').style.display = 'block';
                document.getElementById('appContainer').style.display = 'none';
            }
        });

        document.getElementById('btnLogin').addEventListener('click', async () => {
            const email = document.getElementById('loginEmail').value;
            const pass = document.getElementById('loginPassword').value;
            try { await signInWithEmailAndPassword(auth, email, pass); } 
            catch (error) { alert('อีเมลหรือรหัสผ่านไม่ถูกต้อง'); }
        });

        document.getElementById('btnLogout').addEventListener('click', () => signOut(auth));

        function startRealtimeSync() {
            onSnapshot(doc(db, "resortData", "mainState"), (docSnap) => {
                if (docSnap.exists() && docSnap.data().rooms) {
                    const cloudData = docSnap.data();
                    if (cloudData.rooms.length > 0 && !cloudData.rooms[0].type) {
                        saveDataToCloud(); 
                        return;
                    }
                    appData = cloudData;
                    if(!appData.transactions) appData.transactions = [];
                } else {
                    saveDataToCloud();
                }
                renderRooms();
                updateDashboard();
            });
        }

        async function saveDataToCloud() {
            try { await setDoc(doc(db, "resortData", "mainState"), appData); } 
            catch (e) { console.error("Error saving data: ", e); }
        }

        function renderRooms() {
            const container = document.getElementById('roomContainer');
            container.innerHTML = '';
            appData.rooms.forEach(room => {
                const div = document.createElement('div');
                div.className = `room ${room.status === 'occupied' ? 'occupied' : ''}`;
                const typeLabel = pricing[room.type].label;
                div.innerHTML = `<span class="room-name">${room.name}</span><span class="room-type">(${typeLabel})</span>`;
                div.onclick = () => handleRoomClick(room);
                container.appendChild(div);
            });
        }

        // อัปเดตราคาในช่องกรอกเมื่อเปลี่ยนประเภทการเข้าพัก
        document.getElementById('stayType').addEventListener('change', (e) => {
            if(!currentSelectedRoomId) return;
            const room = appData.rooms.find(r => r.id === currentSelectedRoomId);
            const defaultPrice = pricing[room.type][e.target.value];
            document.getElementById('customPrice').value = defaultPrice;
        });

        function handleRoomClick(room) {
            currentSelectedRoomId = room.id;
            if (room.status === 'available') {
                const typeLabel = pricing[room.type].label;
                const defaultPrice = pricing[room.type]['overnight'];
                
                document.getElementById('modalRoomName').innerText = `เช็คอิน: ${room.name}`;
                document.getElementById('modalRoomTypeDisplay').innerText = `ประเภท: ห้อง${typeLabel}`;
                
                // เซ็ตค่าเริ่มต้นในฟอร์ม
                document.getElementById('customerInfo').value = '';
                document.getElementById('stayType').value = 'overnight';
                document.getElementById('customPrice').value = defaultPrice;
                
                document.getElementById('checkInModal').style.display = 'flex';
            } else {
                document.getElementById('checkoutRoomName').innerText = room.name;
                document.getElementById('checkOutModal').style.display = 'flex';
            }
        }

        const closeModal = () => {
            document.getElementById('checkInModal').style.display = 'none';
            document.getElementById('checkOutModal').style.display = 'none';
            currentSelectedRoomId = null;
        };
        document.getElementById('btnCancelCheckIn').addEventListener('click', closeModal);
        document.getElementById('btnCancelCheckOut').addEventListener('click', closeModal);

        // บันทึกเช็คอินแบบใหม่ (ใช้ราคาที่กรอก + เก็บข้อมูลลูกค้า)
        document.getElementById('btnConfirmCheckIn').addEventListener('click', () => {
            const roomIndex = appData.rooms.findIndex(r => r.id === currentSelectedRoomId);
            const room = appData.rooms[roomIndex];
            const sType = document.getElementById('stayType').value;
            const finalPrice = Number(document.getElementById('customPrice').value);
            let custInfo = document.getElementById('customerInfo').value.trim();
            
            if (!custInfo) custInfo = "ไม่ระบุ"; // ถ้าไม่กรอกให้เป็นค่านี้
            if (finalPrice < 0) { alert('ราคาไม่สามารถติดลบได้'); return; }

            const now = new Date();
            appData.rooms[roomIndex].status = 'occupied';
            appData.transactions.push({
                id: now.getTime(),
                type: 'income',
                amount: finalPrice,
                date: now.toISOString(),
                desc: `ค่าห้อง ${room.name} (${sType === 'overnight' ? 'ค้างคืน' : 'ชั่วคราว'})`,
                customer: custInfo
            });

            saveDataToCloud();
            closeModal();
        });

        document.getElementById('btnConfirmCheckOut').addEventListener('click', () => {
            const roomIndex = appData.rooms.findIndex(r => r.id === currentSelectedRoomId);
            appData.rooms[roomIndex].status = 'available';
            saveDataToCloud();
            closeModal();
        });

        // ฟังก์ชัน เคลียร์ทุกห้อง
        document.getElementById('btnClearAll').addEventListener('click', () => {
            const isConfirm = confirm('คุณแน่ใจหรือไม่ว่าต้องการ "เคลียร์สถานะผู้เข้าพัก" ทุกห้องให้กลับมาว่างพร้อมกัน?');
            if (isConfirm) {
                appData.rooms.forEach(room => {
                    room.status = 'available';
                });
                saveDataToCloud();
            }
        });

        document.getElementById('btnSaveExpense').addEventListener('click', () => {
            const category = document.getElementById('expenseCategory').value;
            const amount = Number(document.getElementById('expenseAmount').value);

            if (!category || amount <= 0) {
                alert('กรุณาเลือกหมวดหมู่และใส่จำนวนเงินให้ถูกต้อง');
                return;
            }

            const now = new Date();
            appData.transactions.push({
                id: now.getTime(),
                type: 'expense',
                amount: amount,
                date: now.toISOString(),
                desc: category
            });

            document.getElementById('expenseCategory').value = '';
            document.getElementById('expenseAmount').value = '';

            saveDataToCloud();
        });

        function updateDashboard() {
            const selector = document.getElementById('monthSelector');
            if(!selector.value) return;
            
            const [selectedYear, selectedMonth] = selector.value.split('-').map(Number);
            const selectedText = selector.options[selector.selectedIndex].text;
            
            document.getElementById('historyTitle').innerText = `ประวัติรายการประจำเดือน ${selectedText}`;

            let monthlyIncome = 0;
            let monthlyExpense = 0;
            const historyContainer = document.getElementById('transactionHistory');
            historyContainer.innerHTML = '';

            const filteredTx = appData.transactions.filter(tx => {
                const txDate = new Date(tx.date);
                return txDate.getMonth() === selectedMonth && txDate.getFullYear() === selectedYear;
            });

            filteredTx.sort((a, b) => b.id - a.id);

            if(filteredTx.length === 0) {
                historyContainer.innerHTML = '<div style="text-align:center; color:gray; padding: 10px;">ไม่มีรายการบันทึกในเดือนนี้</div>';
            }

            filteredTx.forEach(tx => {
                const dateObj = new Date(tx.date);
                const timeStr = `${dateObj.getDate()}/${dateObj.getMonth()+1} ${dateObj.getHours().toString().padStart(2, '0')}:${dateObj.getMinutes().toString().padStart(2, '0')} น.`;
                
                // แสดงข้อมูลลูกค้าในประวัติด้วย (ถ้ามี)
                const customerDisplay = tx.customer ? `<span class="customer-note">ลูกค้า: ${tx.customer}</span>` : '';

                if(tx.type === 'income') {
                    monthlyIncome += tx.amount;
                    historyContainer.innerHTML += `
                        <div class="history-item">
                            <div>
                                <span>${tx.desc}</span><br>
                                <small style="color:gray;">${timeStr}</small>
                                ${customerDisplay}
                            </div>
                            <span class="text-green">+${tx.amount}</span>
                        </div>`;
                } else {
                    monthlyExpense += tx.amount;
                    historyContainer.innerHTML += `
                        <div class="history-item">
                            <div>
                                <span>${tx.desc}</span><br>
                                <small style="color:gray;">${timeStr}</small>
                            </div>
                            <span class="text-red">-${tx.amount}</span>
                        </div>`;
                }
            });

            document.getElementById('totalIncome').innerText = monthlyIncome.toLocaleString() + ' ฿';
            document.getElementById('totalExpense').innerText = monthlyExpense.toLocaleString() + ' ฿';
            
            const net = monthlyIncome - monthlyExpense;
            const netElement = document.getElementById('netProfit');
            if (net > 0) {
                netElement.innerText = 'กำไร ' + net.toLocaleString() + ' ฿';
                netElement.style.color = 'var(--success)';
            } else if (net < 0) {
                netElement.innerText = 'ขาดทุน ' + Math.abs(net).toLocaleString() + ' ฿';
                netElement.style.color = 'var(--danger)';
            } else {
                netElement.innerText = '0 ฿';
                netElement.style.color = 'var(--primary)';
            }
        }
    </script>
</body>
</html>
